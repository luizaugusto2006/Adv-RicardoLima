<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ricardo Lima Advogados Associados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            /* Fundo escuro usando o Marrom Imperial do site oficial */
            background-color: #2B1E16; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }
        /* Linha decorativa dourada no topo da tela */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background-color: #D4AF37;
            z-index: 999;
        }
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.4);
            border: 1px solid #D4AF37; /* Borda fina dourada contornando o card */
            max-width: 430px;
            width: 100%;
            padding: 2.5rem;
        }
        /* Inputs elegantes com foco em dourado */
        .form-control:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25);
        }
        /* Botão Marrom que muda para Dourado ao passar o mouse */
        .btn-marrom-sistema {
            background-color: #2B1E16;
            color: #ffffff;
            border: 1px solid #2B1E16;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .btn-marrom-sistema:hover {
            background-color: #1f150f;
            color: #D4AF37;
            border-color: #D4AF37;
        }
    </style>
</head>
<body>

<div class="container login-container">
    <div class="login-card text-center">
        
        <div class="mb-4">
            {% load static %}
            <img src="{% static 'processos/imagens/logo.png' %}" alt="Logo Ricardo Lima Advogados Associados" class="img-fluid mb-2" style="max-height: 120px;">
        </div>

        <div class="badge bg-light text-dark border px-3 py-2 mb-4 w-100" style="font-size: 0.85rem; font-weight: 500;">
            <span style="color: #2B1E16;">Controle de Processos Trabalhistas</span>
        </div>

        {% if erro %}
            <div class="alert alert-danger py-2" style="font-size: 0.9rem;">
                <i class="fas fa-exclamation-circle me-1"></i> {{ erro }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="form-floating mb-3 text-start">
                <input type="text" name="usuario" class="form-control" id="id_user" placeholder="Usuário" required>
                <label for="id_user" class="text-secondary"><i class="fas fa-user me-1"></i> Usuário</label>
            </div>

            <div class="form-floating mb-4 text-start">
                <input type="password" name="senha" class="form-control" id="id_pass" placeholder="Senha" required>
                <label for="id_pass" class="text-secondary"><i class="fas fa-lock me-1"></i> Senha</label>
            </div>

            <button type="submit" class="btn btn-marrom-sistema w-100 py-2.5 text-uppercase btn-lg" style="font-size: 0.95rem;">
                Entrar no Sistema <i class="fas fa-sign-in-alt ms-1" style="color: #D4AF37;"></i>
            </button>
        </form>

        <div class="mt-4 pt-2 border-top">
            <small class="text-muted" style="font-size: 0.75rem;">&copy; 2026 Soluções Web Corporativas.</small>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
